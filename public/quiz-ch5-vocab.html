<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiz 19 — Ch5 Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111111;--card:#161616;--border:#2a2a2a;--accent:#d4a843;--accent2:#f0c85a;--green:#4ecf7a;--red:#e85454;--yellow:#f0c85a;--text:#e0ddd5;--muted:#5a5548;--dim:#3a3528;--blue:#5ba8e8;--gold-glow:rgba(212,168,67,0.15);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(212,168,67,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,168,67,0.02) 0%,transparent 50%);pointer-events:none;}
.app{position:relative;z-index:1;padding:16px 16px 40px;max-width:520px;margin:0 auto;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#f0c85a,#d4a843,#8b6d1e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:"Cormorant Garamond",serif;letter-spacing:2px;}
.header p{color:var(--muted);font-size:11px;margin-top:3px;letter-spacing:3px;text-transform:uppercase;}

/* Mode selector */
.modes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;justify-content:center;}
.mode-btn{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:all .2s;white-space:nowrap;}
.mode-btn.active{background:linear-gradient(135deg,#8b6d1e,var(--accent));color:#fff;border-color:var(--accent);box-shadow:0 0 12px rgba(212,168,67,0.15);}
.mode-btn .pct{font-size:9px;opacity:.7;display:block;margin-top:1px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.btn{border:none;color:#fff;padding:9px 18px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans';transition:all .2s;}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:default;transform:none;}

.progress-bar{height:4px;background:var(--surface);border-radius:4px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s;}

.draw-canvas{width:100%;max-width:380px;height:240px;border-radius:12px;border:2px solid #8b6d1e;cursor:crosshair;touch-action:none;background:#050508;}

.handwritten{font-family:'Klee One',cursive;font-size:64px;color:#fff;line-height:1.2;padding:14px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.12);border-radius:12px;min-height:100px;display:flex;align-items:center;justify-content:center;}
.your-img{border-radius:12px;border:1px solid var(--border);max-width:150px;max-height:100px;}

.answer-input{width:100%;background:#0a0a0a;border:2px solid var(--border);border-radius:10px;color:#ffffff;padding:12px;font-size:18px;font-weight:500;font-family:'Noto Sans JP','DM Sans';outline:none;caret-color:var(--accent2);}
.answer-input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(212,168,67,0.15);background:#0d0d0d;}
.answer-input::placeholder{color:#5a5548;}

.result-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:10px 14px;border-radius:10px;margin-bottom:5px;}

.dialogue-line{padding:10px 14px;border-radius:10px;margin-bottom:6px;max-width:85%;}
.dialogue-line.a{background:rgba(124,111,247,.1);border:1px solid rgba(212,168,67,0.12);align-self:flex-start;margin-right:auto;}
.dialogue-line.b{background:rgba(0,201,160,.08);border:1px solid rgba(0,201,160,.15);align-self:flex-end;margin-left:auto;}
.dialogue-speaker{font-size:10px;color:var(--muted);margin-bottom:2px;font-weight:700;}

.tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;margin-left:6px;}

textarea.imp-area{width:100%;height:120px;background:#0a0a0a;border:2px solid var(--border);border-radius:10px;color:#ffffff;padding:10px;font-size:12px;font-family:monospace;resize:vertical;}
textarea.imp-area:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(212,168,67,0.15);outline:none;}

.hidden{display:none!important;}
.center{text-align:center;}
.mt6{margin-top:6px;}.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}
.mb8{margin-bottom:8px;}.w100{width:100%;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.gap8{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.slide-up{animation:slideUp .3s ease;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#8b6d1e;border-radius:3px;}

/* ═══ KANA IME ═══ */
.ime-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;flex-wrap:wrap;}
.ime-bar label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.ime-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.ime-toggle button{padding:6px 12px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans';transition:all .2s;color:var(--muted);background:var(--card);}
.ime-toggle button.active{background:var(--accent);color:#fff;}
.ime-preview{font-size:11px;color:var(--accent2);font-family:'Noto Sans JP';min-width:40px;text-align:center;}
.ime-hint{font-size:9px;color:var(--muted);margin-left:auto;}
.kana-pad{display:none;margin-bottom:10px;}
.kana-pad.open{display:block;}
.kana-pad-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.kana-pad-header button{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans';}
.kana-pad-header button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.kana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:320px;margin:0 auto;}
.kana-key{padding:8px 2px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;font-family:'Noto Sans JP';text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.kana-key:hover,.kana-key:active{background:var(--accent);color:#fff;border-color:var(--accent);}
.kana-key.small{font-size:13px;color:var(--muted);}
.kana-key.fn{font-size:11px;font-weight:700;font-family:'DM Sans';color:var(--accent2);}
@media(max-width:600px){
  .kana-grid{grid-template-columns:repeat(5,1fr);gap:3px;max-width:100%;}
  .kana-key{padding:10px 2px;font-size:18px;}
  .ime-bar{gap:6px;padding:6px 10px;}
  .ime-hint{display:none;}
}

.match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:400px){.match-grid{grid-template-columns:repeat(2,1fr);}}
.match-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 8px;min-height:72px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;font-size:14px;font-weight:600;font-family:'Noto Sans JP','DM Sans';transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.match-card:hover{border-color:var(--accent);background:rgba(212,168,67,0.06);}
.match-card.selected{border-color:var(--accent2);background:rgba(240,200,90,0.15);box-shadow:0 0 12px rgba(240,200,90,0.2);}
.match-card.matched{opacity:0;pointer-events:none;transform:scale(.85);transition:all .4s;}
.match-card.wrong{animation:mshake .35s ease;}
@keyframes mshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.match-timer{font-size:28px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;}

/* ═══ AUTOPLAY ═══ */
.autoplay-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;flex-wrap:wrap;}
.autoplay-bar label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.ap-toggle{position:relative;width:40px;height:22px;flex-shrink:0;}.ap-toggle input{opacity:0;width:0;height:0;}
.ap-toggle .ap-slider{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:.3s;}
.ap-toggle .ap-slider::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.3s;}
.ap-toggle input:checked+.ap-slider{background:var(--green);}
.ap-toggle input:checked+.ap-slider::before{transform:translateX(18px);background:#fff;}
.ap-speed{-webkit-appearance:none;appearance:none;width:90px;height:4px;background:var(--border);border-radius:4px;outline:none;}
.ap-speed::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
.ap-val{font-size:12px;color:var(--accent);font-weight:700;min-width:30px;}
.ap-hint{font-size:10px;color:var(--dim);margin-left:auto;}
.cring{position:absolute;top:10px;right:10px;width:46px;height:46px;z-index:10;}
.cring svg{width:46px;height:46px;transform:rotate(-90deg);}
.cring .rbg{fill:none;stroke:var(--border);stroke-width:3;}
.cring .rfg{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .1s linear;}
.cring .rfg.rfront{stroke:#9b59b6;}.cring .rfg.rback{stroke:var(--green);}
.cring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text);}
@media(max-width:600px){.autoplay-bar{gap:8px;padding:8px 12px;}.ap-hint{display:none;}}

</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>Quiz 19 — Ch5 Vocab</h1>
  <p>Write · Listen · Read · Speak</p>
</div>

<!-- Voice Toggle -->
<div id="voiceBar" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px">
  <span style="font-size:12px;color:var(--muted);font-weight:600">🔊 VOICE</span>
  <label style="position:relative;width:40px;height:22px;flex-shrink:0;cursor:pointer">
    <input type="checkbox" checked onchange="toggleVoice(this.checked)" style="opacity:0;width:0;height:0">
    <span style="position:absolute;inset:0;background:var(--border);border-radius:22px;transition:.3s" id="voiceSlider"></span>
    <span style="position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.3s" id="voiceKnob"></span>
  </label>
  <span id="voiceLabel" style="font-size:11px;color:var(--accent);font-weight:700">ON</span>
  <span style="font-size:10px;color:var(--muted);margin-left:6px">Press V to toggle</span>
</div>

<!-- Mode Selector -->
<div class="modes">
  <button class="mode-btn active" onclick="setMode('write')" id="m_write">✍️ Writing<span class="pct">Homework 20%</span></button>
  <button class="mode-btn" onclick="setMode('dictation')" id="m_dictation">👂 Dictation<span class="pct">Quizzes 20%</span></button>
  <button class="mode-btn" onclick="setMode('reading')" id="m_reading">📖 Reading<span class="pct">Exams 40%</span></button>
  <button class="mode-btn" onclick="setMode('oral')" id="m_oral">🗣️ Oral<span class="pct">Oral 10%</span></button>
  <button class="mode-btn" onclick="setMode('mix')" id="m_mix">🎲 Mixed Quiz<span class="pct">Everything</span></button>
  <button class="mode-btn" onclick="setMode('flash')" id="m_flash">🃏 Flashcard<span class="pct">Review All</span></button>
  <button class="mode-btn" onclick="setMode('match')" id="m_match">🎮 Match<span class="pct">Quizlet Style</span></button>
</div>

<!-- Main content area -->
<div id="mainArea"></div>

<!-- Data hardcoded -->
</div>

<script>
// ═══ DEFAULT DATA ═══
let DATA = {"vocab":[{"english":"On, above, over","japanese":"うえ","reading":"On, above, over"},{"english":"Behind, in back of","japanese":"うしろ","reading":"Behind, in back of"},{"english":"Under, beneath","japanese":"した","reading":"Under, beneath"},{"english":"Outside","japanese":"そと","reading":"Outside"},{"english":"Near, in the vicinity of","japanese":"ちかく","reading":"Near, in the vicinity of"},{"english":"Next to","japanese":"となり","reading":"Next to"},{"english":"In, inside","japanese":"なか","reading":"In, inside"},{"english":"To the left, left side","japanese":"ひだり","reading":"To the left, left side"},{"english":"In front of, in the front","japanese":"まえ","reading":"In front of, in the front"},{"english":"To the right","japanese":"みぎ","reading":"To the right"},{"english":"Next to, at the side of","japanese":"よこ","reading":"Next to, at the side of"},{"english":"Chair","japanese":"いす","reading":"Chair"},{"english":"Dog","japanese":"いぬ","reading":"Dog"},{"english":"Picture","japanese":"え","reading":"Picture"},{"english":"Japanese-style closet","japanese":"おしいれ","reading":"Japanese-style closet"},{"english":"School cafeteria","japanese":"がくしょく","reading":"School cafeteria"},{"english":"Student union","japanese":"がくせいかいかん","reading":"Student union"},{"english":"River","japanese":"かわ","reading":"River"},{"english":"Tree","japanese":"き","reading":"Tree"},{"english":"Classroom","japanese":"きょうしつ","reading":"Classroom"},{"english":"Car","japanese":"くるま","reading":"Car"},{"english":"Cell phone","japanese":"けいたい（でんわ）","reading":"Cell phone"},{"english":"Chalkboard","japanese":"こくばん","reading":"Chalkboard"},{"english":"Computer","japanese":"コンピュータ","reading":"Computer"},{"english":"Bicycle","japanese":"じてんしゃ","reading":"Bicycle"},{"english":"Photograph","japanese":"しゃしん","reading":"Photograph"},{"english":"Sofa","japanese":"ソファ","reading":"Sofa"},{"english":"Gym","japanese":"たいいくかん","reading":"Gym"},{"english":"Chest, drawers","japanese":"たんす","reading":"Chest, drawers"},{"english":"Desk","japanese":"つくえ","reading":"Desk"},{"english":"Table","japanese":"テーブル","reading":"Table"},{"english":"Telephone","japanese":"でんわ","reading":"Telephone"},{"english":"Door","japanese":"ドア","reading":"Door"},{"english":"Toilet, restroom","japanese":"トイレ","reading":"Toilet, restroom"},{"english":"Clock, watch","japanese":"とけい","reading":"Clock, watch"},{"english":"Place","japanese":"ところ","reading":"Place"},{"english":"Cat","japanese":"ねこ","reading":"Cat"},{"english":"Bus","japanese":"バス","reading":"Bus"},{"english":"Video","japanese":"ビデオ","reading":"Video"},{"english":"Person","japanese":"ひと","reading":"Person"},{"english":"Futon","japanese":"ふとん","reading":"Futon"},{"english":"Bed","japanese":"ベッド","reading":"Bed"},{"english":"Room","japanese":"へや","reading":"Room"},{"english":"Bookshelf","japanese":"ほんだな","reading":"Bookshelf"},{"english":"Window","japanese":"まど","reading":"Window"},{"english":"Thing (tangible)","japanese":"もの","reading":"Thing (tangible)"},{"english":"Mountain","japanese":"やま","reading":"Mountain"},{"english":"Room (as in computer room)","japanese":"ルーム","reading":"Room (as in computer room)"},{"english":"Computer lab","japanese":"コンピュータ・ルーム","reading":"Computer lab"},{"english":"Media center","japanese":"メディアセンター","reading":"Media center"},{"english":"Kitchen","japanese":"キッチン","reading":"Kitchen"},{"english":"Many, a lot","japanese":"たくさん","reading":"Many, a lot"},{"english":"That person (polite)","japanese":"あのかた","reading":"That person (polite)"},{"english":"The inner part of a building","japanese":"奥","reading":"The inner part of a building"},{"english":"This side (closer)","japanese":"手前","reading":"This side (closer)"},{"english":"To take (time), it costs","japanese":"かかります","reading":"To take (time), it costs"},{"english":"That [+noun] over there","japanese":"あの","reading":"That [+noun] over there"},{"english":"This [+noun]","japanese":"この","reading":"This [+noun]"},{"english":"That [+noun]","japanese":"その","reading":"That [+noun]"},{"english":"Which [+noun]?","japanese":"どの","reading":"Which [+noun]?"},{"english":"Bright","japanese":"あかるい","reading":"Bright"},{"english":"Dark","japanese":"くらい","reading":"Dark"},{"english":"Cramped, narrow","japanese":"せまい","reading":"Cramped, narrow"},{"english":"Fast, quick","japanese":"はやい","reading":"Fast, quick"},{"english":"Spacious, wide","japanese":"ひろい","reading":"Spacious, wide"},{"english":"Quiet","japanese":"しずか（な）","reading":"Quiet"},{"english":"From","japanese":"から","reading":"From"},{"english":"By means of, by, with","japanese":"で","reading":"By means of, by, with"},{"english":"Until, to","japanese":"まで","reading":"Until, to"},{"english":"About (duration or quantity)","japanese":"～ぐらい／くらい","reading":"About (duration or quantity)"},{"english":"~ hours","japanese":"～じかん","reading":"~ hours"},{"english":"But","japanese":"でも","reading":"But"},{"english":"Please come in","japanese":"あがってください","reading":"Please come in"},{"english":"On foot","japanese":"あるいて","reading":"On foot"},{"english":"Welcome! Come in","japanese":"いらっしゃい","reading":"Welcome! Come in"},{"english":"Thank you (before entering someone's house)","japanese":"おじゃまします","reading":"Thank you (before entering someone's house)"},{"english":"Excuse me, anyone home?","japanese":"ごめんください","reading":"Excuse me, anyone home?"},{"english":"How long, how much, how many","japanese":"どのぐらい／どのくらい","reading":"How long, how much, how many"}],"dialogues":[],"readings":[]};

const $=id=>document.getElementById(id);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
let voiceEnabled=true;let jpVoice=null;let voicesReady=false;
function loadVoices(){const v=speechSynthesis.getVoices();jpVoice=v.find(x=>x.lang==='ja-JP'&&x.localService)||v.find(x=>x.lang==='ja-JP')||v.find(x=>x.lang.startsWith('ja'))||null;voicesReady=v.length>0;}
if(typeof speechSynthesis!=='undefined'){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
const speakJP=t=>{if(!voiceEnabled||typeof speechSynthesis==='undefined')return;if(!voicesReady)loadVoices();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=0.85;if(jpVoice)u.voice=jpVoice;try{speechSynthesis.speak(u)}catch(e){}let rt=setInterval(()=>{if(!speechSynthesis.speaking){clearInterval(rt);return}speechSynthesis.pause();speechSynthesis.resume()},10000);u.onend=()=>clearInterval(rt);u.onerror=()=>clearInterval(rt);};
const esc=s=>s.replace(/</g,'&lt;').replace(/>/g,'&gt;');

let mode='write';
let canvas,ctx,drawing=false,lastPos=null,hasStrokes=false;

// ═══ MODE SWITCHING ═══
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  $('m_'+m).classList.add('active');
  render();
}

// ═══ RENDER DISPATCH ═══
function render(){
  const a=$('mainArea');
  switch(mode){
    case 'write': renderWrite(a); break;
    case 'dictation': renderDictation(a); break;
    case 'reading': renderReading(a); break;
    case 'oral': renderOral(a); break;
    case 'mix': renderMix(a); break;
    case 'flash': renderFlash(a); break;
    case 'match': renderMatch(a); break;
  }
}

// ═══════════════════════════
// ✍️ WRITING QUIZ
// ═══════════════════════════
let wCards=[],wIdx=0,wScore=0,wResults=[];

function renderWrite(el){
  wCards=shuffle(DATA.vocab);wIdx=0;wScore=0;wResults=[];
  showWriteCard(el);
}

function showWriteCard(el){
  if(wIdx>=wCards.length)return showWriteResults(el);
  const c=wCards[wIdx];
  el.innerHTML=`
    <div class="flex-between mb8">
      <span style="color:var(--muted);font-size:12px">${wIdx+1}/${wCards.length}</span>
      <span style="color:var(--green);font-size:12px;font-weight:700">${wScore} correct</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((wIdx+1)/wCards.length)*100}%"></div></div>
    <div class="card center">
      <div style="color:var(--muted);font-size:11px;margin-bottom:6px">Write the Japanese for:</div>
      <div style="font-size:34px;font-weight:700;color:#fff">${esc(c.english)}</div>
      <button class="btn mt8" style="background:var(--surface);border:1px solid var(--border);font-size:11px" onclick="speakJP('${c.japanese}')">🔊 Hear it</button>
    </div>
    <div id="wDraw" style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="color:var(--dim);font-size:10px">Draw with mouse, finger, or stylus ↓</div>
      <canvas id="wCanvas" class="draw-canvas"></canvas>
      <div class="gap8">
        <button class="btn" style="background:#1a1a1a" onclick="wClear()">🗑️ Clear</button>
        <button class="btn" style="background:linear-gradient(135deg,#8b6d1e,var(--accent))" id="wCheck" onclick="wCheckAnswer()" disabled>✅ Check</button>
      </div>
    </div>
    <div id="wCompare" class="hidden"></div>`;
  setTimeout(()=>initDrawCanvas('wCanvas','wCheck'),50);
}

function wClear(){clearDrawCanvas('wCanvas','wCheck');}

function getStrokeChars(text){
  return [...text].filter(ch=>{
    const cp=ch.codePointAt(0);
    return (cp>=0x3040&&cp<=0x309F)||(cp>=0x30A0&&cp<=0x30FF)||(cp>=0x4E00&&cp<=0x9FFF)||(cp>=0x3400&&cp<=0x4DBF);
  });
}

function getStrokeOrderHTML(text){
  const chars=getStrokeChars(text);
  if(!chars.length) return '';
  const boxes=chars.map(ch=>{
    const hex=ch.codePointAt(0).toString(16).padStart(5,'0');
    return `<div style="display:inline-flex;flex-direction:column;align-items:center;margin:4px">
      <div id="so_${hex}" style="width:94px;height:94px;background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative">
        <div style="color:var(--dim);font-size:10px;animation:pulse 1.2s infinite">loading</div>
      </div>
      <div style="font-size:11px;color:var(--accent2);margin-top:3px;font-weight:600">${ch}</div>
    </div>`;
  }).join('');
  return `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
    <div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:6px;font-weight:700;letter-spacing:2px">STROKE ORDER</div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px">${boxes}</div>
  </div>`;
}

function loadStrokeOrderSVGs(text){
  const chars=getStrokeChars(text);
  chars.forEach(ch=>{
    const hex=ch.codePointAt(0).toString(16).padStart(5,'0');
    const container=document.getElementById('so_'+hex);
    if(!container) return;
    const url=`https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${hex}.svg`;
    fetch(url).then(r=>{
      if(!r.ok) throw new Error('not found');
      return r.text();
    }).then(svg=>{
      // Recolor SVG for dark mode: strokes white, numbers accent
      // Strip everything before <svg to remove XML declaration, DOCTYPE, and internal DTD subset
      let s=svg.substring(svg.indexOf('<svg'));
      // Recolor strokes and fills for dark mode
      s=s.replace(/stroke\s*:\s*#?000(000)?/gi,'stroke:#d8d8e8')
        .replace(/stroke="#?000(000)?"/gi,'stroke="#d8d8e8"')
        .replace(/fill\s*:\s*#?000(000)?/gi,'fill:#d8d8e8')
        .replace(/fill="#?000(000)?"/gi,'fill="#d8d8e8"');
      // Make number labels use accent color
      s=s.replace(/<text([^>]*)>/gi,'<text$1 fill="#f0c85a" style="fill:#f0c85a;font-weight:bold">');
      // Set viewBox and size
      s=s.replace(/<svg/,'<svg style="width:100%;height:100%"');
      container.innerHTML=s;
    }).catch(()=>{
      // Fallback: show the character itself
      container.innerHTML=`<div style="font-size:48px;font-family:'Klee One';color:var(--accent2)">${ch}</div>`;
    });
  });
}

let oIdx=0,oLine=0,oRevealed=false;

function renderOral(el){
  if(!DATA.dialogues.length){el.innerHTML='<div class="card center" style="color:var(--muted)">No dialogues loaded. Import data with dialogues!</div>';return;}
  oIdx=0;oLine=0;oRevealed=false;

function showOral(el){
  if(oIdx>=DATA.dialogues.length){el.innerHTML=`<div class="card center"><div style="font-size:48px;margin-bottom:8px">🎉</div><div style="font-size:18px;font-weight:700">All dialogues practiced!</div><button class="btn mt16" style="background:linear-gradient(135deg,#8b6d1e,var(--accent))" onclick="renderOral($('mainArea'))">🔄 Again</button></div>`;return;}
  const d=DATA.dialogues[oIdx];
  let html=`<div class="card"><div style="color:var(--accent2);font-size:14px;font-weight:700;margin-bottom:14px">${esc(d.title)} <span class="tag" style="background:rgba(212,168,67,0.12);color:var(--accent2)">Dialogue ${oIdx+1}/${DATA.dialogues.length}</span></div>`;

  // Show lines up to current, with reveal logic
  d.lines.forEach((line,i)=>{
    const isActive=i===oLine;
    const isPast=i<oLine;
    const isFuture=i>oLine;
    const cls=line.speaker==='A'?'a':'b';

    if(isPast){
      html+=`<div class="dialogue-line ${cls}"><div class="dialogue-speaker">${esc(line.speaker)}</div><div class="jp" style="font-size:18px;font-family:'Noto Sans JP';color:#fff">${esc(line.jp)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(line.en)}</div></div>`;
    } else if(isActive){
      html+=`<div class="dialogue-line ${cls}" style="border-width:2px;box-shadow:0 0 12px rgba(212,168,67,0.12)"><div class="dialogue-speaker">${esc(line.speaker)} — YOUR TURN</div>`;
      if(oRevealed){
        html+=`<div class="jp" style="font-size:20px;font-family:'Klee One';color:#fff">${esc(line.jp)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(line.en)}</div>`;
      } else {
        html+=`<div style="font-size:14px;color:var(--yellow);margin-bottom:4px">${esc(line.en)}</div><div style="color:var(--dim);font-size:12px">Try saying it in Japanese first!</div>`;
      }
      html+=`</div>`;
    } else {
      html+=`<div class="dialogue-line ${cls}" style="opacity:.3"><div class="dialogue-speaker">${esc(line.speaker)}</div><div style="color:var(--dim)">• • •</div></div>`;
    }
  });

  html+=`</div><div class="gap8 mt8">`;
  if(!oRevealed){
    html+=`<button class="btn" style="background:linear-gradient(135deg,#8b6d1e,var(--accent))" onclick="oReveal()">👀 Reveal Answer</button>`;
    html+=`<button class="btn" style="background:var(--surface);border:1px solid var(--border)" onclick="oHear()">🔊 Hear it</button>`;
  } else {
    html+=`<button class="btn" style="background:var(--surface);border:1px solid var(--border)" onclick="oHear()">🔊 Hear it</button>`;
    html+=`<button class="btn" style="background:var(--green)" onclick="oNext()">Next Line →</button>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

}

function renderMix(el){
  mQuestions=[];mScore=0;mResults=[];

  DATA.vocab.forEach(v=>mQuestions.push({type:'en2jp',q:`What is "${v.english}" in Japanese?`,a:v.japanese,hint:v.reading}));

// File upload handler
function handleFileUpload(file){
  if(!file) return;
  const status=$('fileStatus');
  status.classList.remove('hidden');
  status.style.background='rgba(124,111,247,.12)';
  status.style.color='var(--accent2)';
  status.textContent='⏳ Reading ' + file.name + '...';

  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const d = JSON.parse(e.target.result);
      applyData(d, file.name);
    } catch(err){
      status.style.background='rgba(255,95,109,.12)';
      status.style.color='var(--red)';
      status.textContent='❌ Invalid JSON in ' + file.name + ' — check format';
    }
  };
  reader.onerror = function(){
    status.style.background='rgba(255,95,109,.12)';
    status.style.color='var(--red)';
    status.textContent='❌ Failed to read file';
  };
  reader.readAsText(file);
}

// Paste fallback
function loadDataFromTextarea(){
  try{
    const d=JSON.parse($('jsonInput').value);
    applyData(d, 'pasted data');
    $('jsonInput').value='';
  }catch(e){alert('Invalid JSON — check format and try again.');}
}

// Core data loader — feeds all 5 modes
function applyData(d, sourceName){
  let loaded = [];
  if(d.vocab && Array.isArray(d.vocab) && d.vocab.length){ DATA.vocab = d.vocab; loaded.push(d.vocab.length + ' vocab'); }
  if(d.dialogues && Array.isArray(d.dialogues) && d.dialogues.length){ DATA.dialogues = d.dialogues; loaded.push(d.dialogues.length + ' dialogues'); }
  if(d.readings && Array.isArray(d.readings) && d.readings.length){ DATA.readings = d.readings; loaded.push(d.readings.length + ' readings'); }

  const status=$('fileStatus');
  status.classList.remove('hidden');
  if(loaded.length){
    status.style.background='rgba(0,201,160,.12)';
    status.style.color='var(--green)';
    status.textContent='✅ Loaded: ' + loaded.join(', ') + ' — all 5 modes updated!';
    // Auto-collapse after short delay
    setTimeout(()=>{ $('impSection').classList.add('hidden'); status.classList.add('hidden'); }, 2200);
    render();
  } else {
    status.style.background='rgba(255,200,87,.12)';
    status.style.color='var(--yellow)';
    status.textContent='⚠️ No vocab, dialogues, or readings found in file';
  }
  // Reset file input so same file can be re-uploaded
  $('fileInput').value='';
}

// Double consonant → っ
const DOUBLE_CONSONANTS='ksztcgdbpfhjmnrwy';

let imeMode='hiragana'; // 'hiragana','katakana','off'
let imeBuffer='';

function hiraganaToKatakana(s){
  return [...s].map(c=>{const cp=c.codePointAt(0);return(cp>=0x3041&&cp<=0x3096)?String.fromCodePoint(cp+0x60):c;}).join('');
}

function processIME(input){
  if(imeMode==='off')return;
  const el=input;
  const val=el.value;
  const pos=el.selectionStart;
  // Find the romaji tail (ASCII letters at cursor position)
  let start=pos;
  while(start>0&&/[a-zA-Z-]/.test(val[start-1]))start--;
  const raw=val.substring(start,pos).toLowerCase();
  if(!raw)return;

  // Try longest match first
  for(let len=Math.min(raw.length,4);len>=1;len--){
    const chunk=raw.substring(raw.length-len);
    // Check double consonant
    if(len>=2&&chunk[0]===chunk[1]&&DOUBLE_CONSONANTS.includes(chunk[0])&&len===2){
      const kana=imeMode==='katakana'?'ッ':'っ';
      const before=val.substring(0,pos-2);
      const after=val.substring(pos);
      el.value=before+kana+chunk[1]+after;
      el.selectionStart=el.selectionEnd=before.length+kana.length+1;
      return;
    }
    if(ROMAJI_MAP[chunk]){
      let kana=ROMAJI_MAP[chunk];
      if(imeMode==='katakana')kana=hiraganaToKatakana(kana);
      const prefixLen=raw.length-len;
      const before=val.substring(0,start+prefixLen);
      const after=val.substring(pos);
      el.value=before+kana+after;
      el.selectionStart=el.selectionEnd=before.length+kana.length;
      return;
    }
  }
  // n followed by non-vowel/y → ん
  if(raw.length>=2&&raw[raw.length-2]==='n'&&!'aiueony'.includes(raw[raw.length-1])){
    const kana=imeMode==='katakana'?'ン':'ん';
    const before=val.substring(0,pos-2);
    const after=val.substring(pos);
    el.value=before+kana+raw[raw.length-1]+after;
    el.selectionStart=el.selectionEnd=before.length+kana.length+1;
  }
}

function getActiveInput(){

function insertKana(ch){
  const inp=getActiveInput();
  if(!inp)return;
  const pos=inp.selectionStart||inp.value.length;
  inp.value=inp.value.substring(0,pos)+ch+inp.value.substring(pos);
  inp.selectionStart=inp.selectionEnd=pos+ch.length;
  inp.focus();
}

function kanaBackspace(){
  const inp=getActiveInput();
  if(!inp||!inp.value)return;
  const pos=inp.selectionStart||inp.value.length;
  if(pos===0)return;
  inp.value=inp.value.substring(0,pos-1)+inp.value.substring(pos);
  inp.selectionStart=inp.selectionEnd=pos-1;
  inp.focus();
}

function kanaSpace(){
  insertKana(' ');
}

      <span style="color:var(--green);font-size:12px;font-weight:700">${fScore} correct</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((fIdx+1)/fCards.length)*100}%"></div></div>
    ${getAutoplayBarHTML()}
    <div class="card center slide-up" style="position:relative;min-height:160px">
      <div style="color:var(--muted);font-size:11px;margin-bottom:4px;letter-spacing:2px;text-transform:uppercase">Answer</div>
      <div class="handwritten" style="font-size:52px">${c.japanese}</div>
      <div style="color:var(--accent2);font-size:13px;margin-top:8px">${c.reading}</div>
    </div>
    <div class="gap8 mt8">
      <button class="btn" style="background:var(--green);padding:11px 28px" onclick="flashGrade(true)">✅ Got it</button>
      <button class="btn" style="background:var(--red);padding:11px 28px" onclick="flashGrade(false)">❌ Missed</button>
    </div>`;
  if(autoPlay.on)showAPRing();
}

function flashGrade(ok){
  if(ok)fScore++;
  fResults.push({...fCards[fIdx],correct:ok});
  fIdx++;
  if(autoPlay.on){
    autoPlay.speed=ok?Math.max(0.5,parseFloat((autoPlay.speed-.5).toFixed(1))):Math.min(30.0,parseFloat((autoPlay.speed+.5).toFixed(1)));
    const sv=document.getElementById('apVal');if(sv)sv.textContent=autoPlay.speed.toFixed(1)+'s';
    const sl=document.getElementById('apSlider');if(sl)sl.value=autoPlay.speed;
  }
  showFlashFront($('mainArea'));
}

function showFlashResults(el){
  clearAPTimer();
  const pct=Math.round((fScore/fCards.length)*100);
  const missed=fResults.filter(r=>!r.correct);
  el.innerHTML=`
    <div class="center" style="margin-bottom:20px">
      <div style="font-size:48px">${pct>=80?'🎉':pct>=50?'📝':'💪'}</div>
      <div style="font-size:32px;font-weight:700">${fScore}/${fCards.length}</div>
      <div style="color:var(--muted);font-size:14px">${pct}%</div>
    </div>
    ${fResults.map(r=>`<div class="result-row" style="border-left:3px solid ${r.correct?'var(--green)':'var(--red)'}"><div><span style="color:#fff;font-size:13px">${esc(r.english)}</span><span style="color:var(--dim);font-size:11px;margin-left:8px">→ ${r.japanese}</span></div><div style="color:${r.correct?'var(--green)':'var(--red)'}">${r.correct?'✓':'✗'}</div></div>`).join('')}
    ${missed.length?`<button class="btn w100 mt8" style="background:var(--red)" onclick="reReviewMissed($('mainArea'))">🔁 Re-review Missed (${missed.length})</button>`:''}
    <button class="btn w100 mt8" style="background:linear-gradient(135deg,#8b6d1e,var(--accent))" onclick="renderFlash($('mainArea'))">🔄 Restart All</button>`;
}

function reReviewMissed(el){
  const missed=fResults.filter(r=>!r.correct).map(r=>({english:r.english,japanese:r.japanese,reading:r.reading}));
  fCards=shuffle(missed);fIdx=0;fScore=0;fResults=[];
  showFlashFront(el);
}

// ═══ AUTOPLAY TIMER ═══
function toggleAutoPlay(on){autoPlay.on=on;clearAPTimer();const t=document.getElementById('apToggle');if(t&&t.checked!==on)t.checked=on;if(on)startAPTimer();}
function setAutoSpeed(val){autoPlay.speed=parseFloat(val);const sv=document.getElementById('apVal');if(sv)sv.textContent=autoPlay.speed.toFixed(1)+'s';if(autoPlay.on){clearAPTimer();startAPTimer();}}
function clearAPTimer(){if(autoPlay.timer){clearInterval(autoPlay.timer);autoPlay.timer=null;}autoPlay.elapsed=0;const r=document.getElementById('apRing');if(r)r.remove();}
function startAPTimer(){if(!autoPlay.on)return;autoPlay.elapsed=0;autoPlay.phase='front';showAPRing();autoPlay.timer=setInterval(()=>{autoPlay.elapsed+=0.1;updateAPRing();if(autoPlay.elapsed>=autoPlay.speed){autoPlay.elapsed=0;apAdvance();}},100);}
function apAdvance(){
  if(autoPlay.phase==='front'){
    const btns=document.querySelectorAll('#mainArea button');
    for(const b of btns){const t=b.textContent.toLowerCase();if(t.includes('check')||t.includes('show')||t.includes('reveal')){if(b.disabled){const m=b.id&&b.id.match(/^wCheck_?(.*)$/);if(m&&typeof wCheckAnswer==='function')wCheckAnswer(m[1]||undefined);}else b.click();autoPlay.phase='back';autoPlay.elapsed=0;updateAPRing();return;}}
    autoPlay.phase='back';autoPlay.elapsed=0;
  }
  if(autoPlay.phase==='back'){
    const btns=document.querySelectorAll('button');
    for(const b of btns){const t=b.textContent.toLowerCase();if(t.includes('got it')||t.includes('next')||t.includes('correct')){b.click();autoPlay.phase='front';autoPlay.elapsed=0;updateAPRing();return;}}
    autoPlay.phase='front';autoPlay.elapsed=0;
  }
}
function showAPRing(){let r=document.getElementById('apRing');if(r)r.remove();const card=document.querySelector('.card.center');if(!card)return;card.style.position='relative';r=document.createElement('div');r.id='apRing';r.className='cring';const cr=19,cc=2*Math.PI*cr;r.innerHTML=`<svg viewBox="0 0 48 48"><circle class="rbg" cx="24" cy="24" r="${cr}"/><circle class="rfg ${autoPlay.phase==='front'?'rfront':'rback'}" id="ringFg" cx="24" cy="24" r="${cr}" stroke-dasharray="${cc}" stroke-dashoffset="0"/></svg><div class="cring-num" id="ringNum">${autoPlay.speed.toFixed(1)}</div>`;card.prepend(r);}
function updateAPRing(){const fg=document.getElementById('ringFg');const num=document.getElementById('ringNum');if(!fg||!num){showAPRing();return;}const cr=19,cc=2*Math.PI*cr;fg.setAttribute('stroke-dashoffset',(cc*(1-autoPlay.elapsed/autoPlay.speed)).toString());fg.className.baseVal='rfg '+(autoPlay.phase==='front'?'rfront':'rback');num.textContent=Math.max(0,autoPlay.speed-autoPlay.elapsed).toFixed(1);}

// Keyboard shortcuts for flashcard mode
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='a'||e.key==='A')toggleAutoPlay(!autoPlay.on);
  if(e.key==='1'){const b=document.querySelector('.btn[onclick*="flashGrade(true)"]');if(b)flashGrade(true);}
  if(e.key==='2'){const b=document.querySelector('.btn[onclick*="flashGrade(false)"]');if(b)flashGrade(false);}
  if(e.key===' '||e.key==='ArrowRight'){const b=document.querySelector('.btn[onclick*="showFlashBack"]');if(b){e.preventDefault();showFlashBack($('mainArea'));}}
});

</script>
</body>
</html>
