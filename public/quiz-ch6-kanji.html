<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiz 23 - Ch. 6 Kanji</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111111;--card:#161616;--border:#2a2a2a;--accent:#d4a843;--accent2:#f0c85a;--green:#4ecf7a;--red:#e85454;--yellow:#f0c85a;--text:#e0ddd5;--muted:#5a5548;--dim:#3a3528;--blue:#5ba8e8;--gold-glow:rgba(212,168,67,0.15);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(212,168,67,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,168,67,0.02) 0%,transparent 50%);pointer-events:none;}
.app{position:relative;z-index:1;padding:16px 16px 40px;max-width:520px;margin:0 auto;}
.header{text-align:center;margin-bottom:20px;}
.header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#f0c85a,#d4a843,#8b6d1e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:"Cormorant Garamond",serif;letter-spacing:2px;}
.header p{color:var(--muted);font-size:11px;margin-top:3px;letter-spacing:3px;text-transform:uppercase;}
.modes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;justify-content:center;}
.mode-btn{padding:10px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:all .2s;white-space:nowrap;}
.mode-btn.active{background:linear-gradient(135deg,#8b6d1e,var(--accent));color:#fff;border-color:var(--accent);box-shadow:0 0 12px rgba(212,168,67,0.15);}
.mode-btn .pct{font-size:9px;opacity:.7;display:block;margin-top:1px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.btn{border:none;color:#fff;padding:9px 18px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans';transition:all .2s;}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:default;transform:none;}
.progress-bar{height:4px;background:var(--surface);border-radius:4px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s;}
.answer-input{width:100%;background:#0a0a0a;border:2px solid var(--border);border-radius:10px;color:#ffffff;padding:14px;font-size:22px;font-weight:500;font-family:'Noto Sans JP','DM Sans';outline:none;caret-color:var(--accent2);text-align:center;}
.answer-input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(212,168,67,0.15);background:#0d0d0d;}
.answer-input::placeholder{color:#5a5548;font-size:14px;}
.answer-input:disabled{opacity:.5;}
.result-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:10px 14px;border-radius:10px;margin-bottom:5px;}
.hidden{display:none!important;}
.center{text-align:center;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}
.mb8{margin-bottom:8px;}.w100{width:100%;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.gap8{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.slide-up{animation:slideUp .3s ease;}
.shake{animation:shake .35s ease;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#8b6d1e;border-radius:3px;}

/* Category badge */
.cat-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}

/* Irregular badge */
.irr-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(240,200,90,0.1);border:1px solid rgba(240,200,90,0.3);border-radius:20px;font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:10px;}

/* Hiragana prompt */
.hira-prompt{font-size:52px;font-family:'Noto Sans JP','Klee One',cursive;color:#fff;margin:10px 0 6px;line-height:1.2;letter-spacing:2px;}

/* Correct answer display */
.answer-display{font-size:54px;font-family:'Klee One',cursive;line-height:1.2;}

/* Score breakdown */
.score-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
.score-chip{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;}

@media(max-width:480px){
  .hira-prompt{font-size:44px;}
  .answer-input{font-size:20px;}
  .answer-display{font-size:44px;}
}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>Quiz 23 — Ch. 6 Kanji</h1>
  <p>Hiragana → produce the correct kanji or katakana</p>
</div>

<!-- Voice Toggle -->
<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px">
  <span style="font-size:12px;color:var(--muted);font-weight:600">🔊 VOICE</span>
  <label style="position:relative;width:40px;height:22px;flex-shrink:0;cursor:pointer">
    <input type="checkbox" checked onchange="toggleVoice(this.checked)" style="opacity:0;width:0;height:0">
    <span style="position:absolute;inset:0;background:var(--border);border-radius:22px;transition:.3s" id="voiceSlider"></span>
    <span style="position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.3s" id="voiceKnob"></span>
  </label>
  <span id="voiceLabel" style="font-size:11px;color:var(--accent);font-weight:700">ON</span>
  <span style="font-size:10px;color:var(--muted);margin-left:6px">Press V to toggle</span>
</div>

<!-- Mode Selector -->
<div class="modes">
  <button class="mode-btn active" onclick="setMode('single')" id="m_single">
    📝 Single Kanji Drill
    <span class="pct">10 words</span>
  </button>
  <button class="mode-btn" onclick="setMode('full')" id="m_full">
    📚 Full Vocab Drill
    <span class="pct">69 words</span>
  </button>
</div>

<!-- Main content -->
<div id="mainArea"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// WORD DATA — all 69 Quiz 23 entries
// ═══════════════════════════════════════════════

const SINGLE_KANJI = [
  {h:"いま",       a:"今",     en:"now / present",          cat:"SINGLE"},
  {h:"わたし",     a:"私",     en:"I / me",                  cat:"SINGLE"},
  {h:"つき",       a:"月",     en:"moon / month",            cat:"SINGLE"},
  {h:"ひ",         a:"火",     en:"fire",                    cat:"SINGLE"},
  {h:"みず",       a:"水",     en:"water",                   cat:"SINGLE"},
  {h:"き",         a:"木",     en:"tree / wood",             cat:"SINGLE"},
  {h:"かね",       a:"金",     en:"gold / money",            cat:"SINGLE"},
  {h:"つち",       a:"土",     en:"earth / soil",            cat:"SINGLE"},
  {h:"なに / なん",a:"何",     en:"what",                    cat:"SINGLE"},
  {h:"やすむ",     a:"休",     en:"rest",                    cat:"SINGLE"},
];

const COMPOUNDS = [
  {h:"げつようび", a:"月曜日",  en:"Monday",                  cat:"COMPOUND"},
  {h:"かようび",   a:"火曜日",  en:"Tuesday",                 cat:"COMPOUND"},
  {h:"すいようび", a:"水曜日",  en:"Wednesday",               cat:"COMPOUND"},
  {h:"もくようび", a:"木曜日",  en:"Thursday",                cat:"COMPOUND"},
  {h:"きんようび", a:"金曜日",  en:"Friday",                  cat:"COMPOUND"},
  {h:"どようび",   a:"土曜日",  en:"Saturday",                cat:"COMPOUND"},
  {h:"にちようび", a:"日曜日",  en:"Sunday",                  cat:"COMPOUND"},
  {h:"こんしゅう", a:"今週",    en:"this week",               cat:"COMPOUND"},
  {h:"せんしゅう", a:"先週",    en:"last week",               cat:"COMPOUND"},
  {h:"しゅうまつ", a:"週末",    en:"weekend",                 cat:"COMPOUND"},
  {h:"きょう",     a:"今日",    en:"today",                   cat:"COMPOUND", irr:true},
  {h:"こんばん",   a:"今晩",    en:"tonight",                 cat:"COMPOUND"},
  {h:"やすみのひ", a:"休みの日",en:"day off / holiday",       cat:"COMPOUND"},
  {h:"うんどう",   a:"運動",    en:"exercise",                cat:"COMPOUND"},
  {h:"おんがく",   a:"音楽",    en:"music",                   cat:"COMPOUND"},
  {h:"かいもの",   a:"買い物",  en:"shopping",                cat:"COMPOUND"},
  {h:"しごと",     a:"仕事",    en:"work / job",              cat:"COMPOUND"},
  {h:"しつもん",   a:"質問",    en:"question",                cat:"COMPOUND"},
  {h:"しんぶん",   a:"新聞",    en:"newspaper",               cat:"COMPOUND"},
  {h:"せんたく",   a:"洗濯",    en:"laundry",                 cat:"COMPOUND"},
  {h:"そうじ",     a:"掃除",    en:"cleaning",                cat:"COMPOUND"},
  {h:"てがみ",     a:"手紙",    en:"letter (mail)",           cat:"COMPOUND"},
  {h:"ともだち",   a:"友達",    en:"friend(s)",               cat:"COMPOUND"},
  {h:"りょうしん", a:"両親",    en:"parents",                 cat:"COMPOUND"},
  {h:"りょうり",   a:"料理",    en:"cooking",                 cat:"COMPOUND"},
  {h:"さんぽ",     a:"散歩",    en:"a walk / stroll",        cat:"COMPOUND"},
  {h:"ざっし",     a:"雑誌",    en:"magazine",                cat:"COMPOUND"},
  {h:"こんど",     a:"今度",    en:"next time",               cat:"COMPOUND"},
];

const VERBS = [
  {h:"あいます",   a:"会います",  en:"to meet",               cat:"VERB"},
  {h:"あそびます", a:"遊びます",  en:"to play / hang out",    cat:"VERB"},
  {h:"あるきます", a:"歩きます",  en:"to walk",               cat:"VERB"},
  {h:"いいます",   a:"言います",  en:"to say",                cat:"VERB"},
  {h:"およぎます", a:"泳ぎます",  en:"to swim",               cat:"VERB"},
  {h:"かきます",   a:"書きます",  en:"to write",              cat:"VERB"},
  {h:"ききます",   a:"聞きます",  en:"to listen / ask",       cat:"VERB"},
  {h:"はなします", a:"話します",  en:"to speak",              cat:"VERB"},
  {h:"まちます",   a:"待ちます",  en:"to wait",               cat:"VERB"},
  {h:"よびます",   a:"呼びます",  en:"to call / invite",      cat:"VERB"},
  {h:"でかけます", a:"出かけます",en:"to go out",             cat:"VERB"},
];

const ADJS = [
  {h:"いそがしい",   a:"忙しい",  en:"busy",                  cat:"ADJ"},
  {h:"うれしい",     a:"嬉しい",  en:"happy / glad",          cat:"ADJ"},
  {h:"おもしろい",   a:"面白い",  en:"interesting / funny",   cat:"ADJ"},
  {h:"かなしい",     a:"悲しい",  en:"sad",                   cat:"ADJ"},
  {h:"さびしい",     a:"寂しい",  en:"lonely",                cat:"ADJ"},
  {h:"たのしい",     a:"楽しい",  en:"fun / enjoyable",       cat:"ADJ"},
  {h:"やさしい",     a:"優しい",  en:"kind / gentle",         cat:"ADJ"},
  {h:"ざんねん",     a:"残念",    en:"unfortunate / too bad", cat:"ADJ"},
  {h:"ひま",         a:"暇",      en:"free time / not busy",  cat:"ADJ"},
  {h:"たいへん",     a:"大変",    en:"tough / difficult",     cat:"ADJ"},
  {h:"だいじょうぶ", a:"大丈夫",  en:"okay / all right",      cat:"ADJ"},
];

const KATAKANA = [
  {h:"あるばいと", a:"アルバイト", en:"part-time job",         cat:"KATA"},
  {h:"げーむ",     a:"ゲーム",     en:"game",                  cat:"KATA"},
  {h:"こんさーと", a:"コンサート", en:"concert",               cat:"KATA"},
  {h:"じょぎんぐ", a:"ジョギング", en:"jogging",               cat:"KATA"},
  {h:"てにす",     a:"テニス",     en:"tennis",                cat:"KATA"},
  {h:"ぱーてぃ",   a:"パーティ",   en:"party",                 cat:"KATA"},
  {h:"ぴくにっく", a:"ピクニック", en:"picnic",                cat:"KATA"},
  {h:"ぷーる",     a:"プール",     en:"pool",                  cat:"KATA"},
  {h:"めーる",     a:"メール",     en:"email / message",       cat:"KATA"},
];

const ALL_WORDS = [
  ...SINGLE_KANJI, ...COMPOUNDS, ...VERBS, ...ADJS, ...KATAKANA
];

// Category display config
const CAT_CFG = {
  SINGLE:   {label:"Single Kanji",    color:"var(--accent)",   bg:"rgba(212,168,67,0.1)"},
  COMPOUND: {label:"Compound Word",   color:"var(--blue)",     bg:"rgba(91,168,232,0.1)"},
  VERB:     {label:"Verb",            color:"var(--green)",    bg:"rgba(78,207,122,0.1)"},
  ADJ:      {label:"Adjective",       color:"var(--yellow)",   bg:"rgba(240,200,90,0.1)"},
  KATA:     {label:"Katakana",        color:"#c084fc",         bg:"rgba(192,132,252,0.1)"},
};

// ═══════════════════════════════════════════════
// VOICE
// ═══════════════════════════════════════════════
let voiceEnabled=true;let jpVoice=null;let voicesReady=false;
function loadVoices(){const v=speechSynthesis.getVoices();jpVoice=v.find(x=>x.lang==='ja-JP'&&x.localService)||v.find(x=>x.lang==='ja-JP')||v.find(x=>x.lang.startsWith('ja'))||null;voicesReady=v.length>0;}
if(typeof speechSynthesis!=='undefined'){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function speakJP(t){if(!voiceEnabled||typeof speechSynthesis==='undefined')return;if(!voicesReady)loadVoices();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=0.85;if(jpVoice)u.voice=jpVoice;try{speechSynthesis.speak(u)}catch(e){}}
function toggleVoice(on){
  voiceEnabled=on;
  const sl=document.getElementById('voiceSlider');
  const kn=document.getElementById('voiceKnob');
  const lb=document.getElementById('voiceLabel');
  if(sl){sl.style.background=on?'var(--green)':'var(--border)';}
  if(kn){kn.style.transform=on?'translateX(18px)':'translateX(0)';kn.style.background=on?'#fff':'var(--muted)';}
  if(lb){lb.textContent=on?'ON':'OFF';lb.style.color=on?'var(--accent)':'var(--muted)';}
}
// Keyboard shortcut: V toggles voice
document.addEventListener('keydown',e=>{
  if(e.key==='v'||e.key==='V'){
    if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
    voiceEnabled=!voiceEnabled;
    const cb=document.querySelector('#voiceBar input[type=checkbox]');
    if(cb)cb.checked=voiceEnabled;
    toggleVoice(voiceEnabled);
  }
});

// ═══════════════════════════════════════════════
// QUIZ STATE
// ═══════════════════════════════════════════════
let mode='single';
let cards=[],idx=0,score=0,results=[];
let checking=false; // prevent double-submit

const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const $=id=>document.getElementById(id);

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  $('m_'+m).classList.add('active');
  startQuiz();
}

function startQuiz(){
  const pool=mode==='single'?SINGLE_KANJI:ALL_WORDS;
  cards=shuffle([...pool]);
  idx=0;score=0;results=[];checking=false;
  showCard();
}

// ═══════════════════════════════════════════════
// CARD DISPLAY
// ═══════════════════════════════════════════════
function showCard(){
  const el=$('mainArea');
  if(idx>=cards.length){showResults(el);return;}
  checking=false;
  const c=cards[idx];
  const cfg=CAT_CFG[c.cat]||CAT_CFG.SINGLE;
  const pct=((idx)/cards.length)*100;
  const isKata=c.cat==='KATA';
  const irrHTML=c.irr?`<div class="irr-badge">⚠️ Irregular reading: <strong>今日</strong> is read <strong>きょう</strong>, not こんにち</div>`:'';

  el.innerHTML=`
    <div class="flex-between mb8">
      <span style="color:var(--muted);font-size:12px">${idx+1} / ${cards.length}</span>
      <span style="color:var(--green);font-size:12px;font-weight:700">${score} correct</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="card center" style="padding:24px 20px">
      <div class="cat-badge" style="color:${cfg.color};background:${cfg.bg}">${cfg.label}</div>
      ${irrHTML}
      <div class="hira-prompt">${esc(c.h)}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:2px">
        Write the ${isKata?'katakana':'kanji'}
      </div>
    </div>

    <div class="card">
      <input class="answer-input" id="ansInput"
        placeholder="${isKata?'カタカナで…':'漢字で…'}"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(!event.isComposing&&event.key==='Enter')submitAnswer()">
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn" style="background:var(--surface);border:1px solid var(--border);flex-shrink:0"
          onclick="skipCard()">Skip</button>
        <button class="btn w100" style="background:linear-gradient(135deg,#8b6d1e,var(--accent))"
          onclick="submitAnswer()">Check ✓</button>
      </div>
      <div style="color:var(--muted);font-size:10px;text-align:center;margin-top:8px">
        Use your Japanese keyboard / OS IME to type
      </div>
    </div>

    <div id="feedback"></div>`;

  setTimeout(()=>{const inp=$('ansInput');if(inp)inp.focus();},60);
}

// ═══════════════════════════════════════════════
// ANSWER CHECKING
// ═══════════════════════════════════════════════
function submitAnswer(){
  if(checking)return;
  const inp=$('ansInput');
  if(!inp)return;
  const ans=(inp.value||'').trim();
  if(!ans)return;

  checking=true;
  inp.disabled=true;

  const c=cards[idx];
  const correct=(ans===c.a);

  results.push({c,ans,correct});
  if(correct)score++;

  showFeedback(correct,c,ans);
}

function showFeedback(ok,c,ans){
  const fb=$('feedback');
  if(!fb)return;

  if(ok){
    speakJP(c.a);
    fb.innerHTML=`
      <div class="card slide-up center" style="border-color:var(--green);background:rgba(78,207,122,0.05)">
        <div style="font-size:30px;margin-bottom:6px">✅</div>
        <div class="answer-display" style="color:var(--green)">${esc(c.a)}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:6px">${esc(c.en)}</div>
        <div style="color:var(--dim);font-size:11px;margin-top:3px">${esc(c.h)}</div>
      </div>`;
    // auto-advance after 1.3s
    setTimeout(()=>{idx++;showCard();},1300);
  } else {
    speakJP(c.a);
    fb.innerHTML=`
      <div class="card slide-up shake" style="border-color:var(--red);background:rgba(232,84,84,0.05)">
        <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px">
          <span style="font-size:24px;flex-shrink:0">❌</span>
          <div style="text-align:left">
            <div style="color:var(--muted);font-size:10px;font-weight:700;letter-spacing:1px">YOU WROTE</div>
            <div style="color:var(--red);font-size:20px;font-family:'Noto Sans JP'">${ans?esc(ans):'(nothing)'}</div>
          </div>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;text-align:center">
          <div style="color:var(--muted);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:6px">CORRECT ANSWER</div>
          <div class="answer-display" style="color:var(--accent2)">${esc(c.a)}</div>
          <div style="color:var(--accent);font-size:13px;margin-top:4px">${esc(c.h)}</div>
          <div style="color:var(--muted);font-size:13px;margin-top:3px">${esc(c.en)}</div>
        </div>
        <button class="btn w100 mt12" style="background:linear-gradient(135deg,#8b6d1e,var(--accent))"
          onclick="advanceCard()">Next →</button>
      </div>`;
  }
}

function skipCard(){
  if(checking)return;
  results.push({c:cards[idx],ans:'',correct:false,skipped:true});
  idx++;showCard();
}

function advanceCard(){idx++;showCard();}

// ═══════════════════════════════════════════════
// RESULTS SCREEN
// ═══════════════════════════════════════════════
function showResults(el){
  const total=results.length;
  const pct=total?Math.round((score/total)*100):0;
  const emoji=pct>=90?'🎉':pct>=70?'📝':'💪';

  // Category breakdown
  const cats={};
  results.forEach(r=>{
    const k=r.c.cat;
    if(!cats[k])cats[k]={right:0,total:0};
    cats[k].total++;
    if(r.correct)cats[k].right++;
  });

  const breakdownHTML=Object.entries(cats).map(([k,v])=>{
    const cfg=CAT_CFG[k]||{label:k,color:'var(--muted)',bg:'var(--surface)'};
    const bpct=Math.round((v.right/v.total)*100);
    return `<div class="score-chip" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}: ${v.right}/${v.total} (${bpct}%)</div>`;
  }).join('');

  const rowsHTML=results.map(r=>{
    const ok=r.correct;
    const skipped=r.skipped;
    const cfg=CAT_CFG[r.c.cat]||{color:'var(--muted)'};
    return `
      <div class="result-row" style="border-left:3px solid ${ok?'var(--green)':skipped?'var(--dim)':'var(--red)'}">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="color:var(--muted);font-size:12px">${esc(r.c.h)}</span>
            <span style="color:#fff;font-size:18px;font-family:'Klee One'">${esc(r.c.a)}</span>
            <span style="color:var(--dim);font-size:11px">${esc(r.c.en)}</span>
          </div>
          ${!ok&&!skipped?`<div style="color:var(--red);font-size:11px;margin-top:2px">You: ${esc(r.ans)||'(empty)'}</div>`:''}
          ${skipped?`<div style="color:var(--dim);font-size:11px;margin-top:2px">— skipped</div>`:''}
        </div>
        <div style="color:${ok?'var(--green)':skipped?'var(--dim)':'var(--red)'};font-size:16px;margin-left:8px;flex-shrink:0">${ok?'✓':skipped?'—':'✗'}</div>
      </div>`;
  }).join('');

  el.innerHTML=`
    <div class="center" style="margin-bottom:20px">
      <div style="font-size:52px;margin-bottom:6px">${emoji}</div>
      <div style="font-size:42px;font-weight:700;color:var(--accent2)">${score} / ${total}</div>
      <div style="font-size:22px;color:${pct>=70?'var(--green)':'var(--red)'};font-weight:700">${pct}%</div>
    </div>

    <div class="score-bar">${breakdownHTML}</div>

    <div style="margin-bottom:12px">${rowsHTML}</div>

    <div style="display:flex;gap:8px">
      <button class="btn w100" style="background:linear-gradient(135deg,#8b6d1e,var(--accent))"
        onclick="startQuiz()">🔄 Retry (new order)</button>
    </div>`;
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
// Initialize voice slider to ON state
toggleVoice(true);
startQuiz();
</script>
</body>
