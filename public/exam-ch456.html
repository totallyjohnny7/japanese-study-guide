<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>なかま1 だい4・5・6か ふくしゅう プリント</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* === RESET & BASE === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --bg4: #222222;
    --text: #f5f5f5;
    --text2: #aaaaaa;
    --gold: #d4af37;
    --gold-dim: #a8892a;
    --gold-glow: rgba(212,175,55,0.25);
    --red: #c0392b;
    --red-dim: rgba(192,57,43,0.15);
    --green: #27ae60;
    --green-dim: rgba(39,174,96,0.12);
    --border: rgba(212,175,55,0.2);
    --font-jp: 'Noto Sans JP', sans-serif;
    --font-en: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-en);
    font-size: 15px;
    line-height: 1.6;
    padding-top: 64px;
  }

  /* === TOOLBAR === */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    z-index: 1000;
    flex-wrap: nowrap;
    overflow-x: auto;
  }

  #toolbar .title-small {
    font-family: var(--font-jp);
    font-size: 13px;
    color: var(--gold);
    white-space: nowrap;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .btn {
    font-family: var(--font-en);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .btn:hover { background: var(--bg4); border-color: var(--gold); color: var(--gold); }
  .btn.primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
  .btn.primary:hover { background: #e8c84a; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red-dim); }

  #variant-badge {
    margin-left: auto;
    font-family: var(--font-en);
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg2);
  }
  #variant-badge span { color: var(--gold); font-weight: 700; }

  /* === SCORE BANNER === */
  #score-banner {
    display: none;
    position: sticky;
    top: 56px;
    z-index: 900;
    background: var(--bg2);
    border-bottom: 2px solid var(--gold);
    padding: 14px 24px;
    text-align: center;
  }
  #score-banner.visible { display: block; }
  #score-banner .grade { font-size: 28px; font-weight: 700; color: var(--gold); }
  #score-banner .score-text { font-size: 15px; color: var(--text2); margin-top: 2px; }
  #score-banner .breakdown { font-size: 13px; color: var(--text2); margin-top: 6px; }

  /* === MAIN LAYOUT === */
  #main {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  .page-title {
    font-family: var(--font-jp);
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .page-subtitle {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 28px;
  }

  /* === SECTION === */
  .section {
    margin-bottom: 36px;

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);

    width: 30px; height: 30px;
    background: var(--gold);
    color: #000;
    font-weight: 700;
    font-size: 14px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;

  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .section-pts {
    margin-left: auto;
    font-size: 12px;
    color: var(--text2);
  }

  /* === QUESTION ITEM === */
  .q-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .q-item.correct { border-color: var(--gold); background: var(--green-dim); }
  .q-item.wrong { border-color: var(--red); background: var(--red-dim); }
  .q-item.partial { border-color: #f39c12; background: rgba(243,156,18,0.08); }

  .q-number {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .q-prompt {
    font-family: var(--font-jp);
    font-size: 16px;
    color: var(--text);
    margin-bottom: 12px;
    cursor: pointer;
    display: inline-block;
  }
  .q-prompt:hover { color: var(--gold); }
  .dict-play-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 20px; border-radius: 8px;
    border: 1px solid var(--gold-dim); background: rgba(212,175,55,0.1);
    color: var(--gold); font-size: 16px; font-weight: 600;
    font-family: var(--font-en); cursor: pointer; transition: all 0.2s;
  }
  .dict-play-btn:hover { background: var(--gold-dim); color: #fff; border-color: var(--gold); }
  .dict-play-btn:active { transform: scale(0.95); }
  .ime-hint { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }
  .q-hint { font-size: 11px; color: var(--text2); font-style: italic; margin-bottom: 10px; }

  /* === INPUTS === */
  .input-row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }

  input[type="text"], textarea {
    font-family: var(--font-jp);
    font-size: 15px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--gold-dim);
    color: var(--text);
    padding: 6px 2px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    width: 100%;

  input[type="text"]:focus, textarea:focus {
    border-bottom-color: var(--gold);
    box-shadow: 0 2px 0 -1px var(--gold-glow);
  }
  input[type="text"]::placeholder, textarea::placeholder {
    color: var(--gold-dim);
    font-style: italic;
    font-size: 12px;
  }
  textarea {
    resize: vertical;
    min-height: 58px;
    line-height: 1.5;
    border: none;
    border-bottom: 1px solid var(--gold-dim);

  .ak-item { font-size: 13px; margin-bottom: 6px; display: flex; gap: 10px; }
  .ak-num { color: var(--text2); min-width: 30px; }
  .ak-ans { font-family: var(--font-jp); color: var(--text); }

  .ch-badge {

    border: 1px solid var(--border);

    vertical-align: middle;
    font-family: var(--font-en);

  /* === RESPONSIVE === */
  @media (max-width: 600px) {

    .btn { padding: 5px 10px; font-size: 11px; }

  /* === TTS click indicator === */
  .tts-hint {

    font-family: var(--font-en);
    margin-left: 6px;

  /* === PRINT STYLES === */
  @media print {
    body { background: #fff !important; color: #000 !important; padding-top: 0 !important; font-size: 12px; }
    #toolbar, #score-banner, .no-print { display: none !important; }

    .q-item { background: #fff !important; border: 1px solid #ccc !important; page-break-inside: avoid; }

    input[type="text"] { border: none !important; border-bottom: 1px solid #000 !important; background: #fff !important; color: #000 !important; }
    textarea { border: none !important; border-bottom: 1px solid #000 !important; background: #fff !important; color: #000 !important; }
    .page-title { color: #000 !important; }
    .section-letter { background: #000 !important; color: #fff !important; }
    .btn { display: none !important; }
    .tts-hint { display: none !important; }
    .dict-play-btn { display: none !important; }
    .q-prompt { color: #000 !important; }
    .particle-sentence { color: #000 !important; }
    .section-header { border-bottom-color: #000 !important; }
  }

  body.print-with-key .feedback-row { display: block !important; }
  body.print-blank .feedback-row { display: none !important; }

  @media print {
    body.print-with-key input, body.print-with-key textarea { visibility: hidden; }
    body.print-blank .feedback-row { display: none !important; }
  }

<script>
"use strict";

/* =====================================================================
   ROMAJI → KANA IME (auto-converts as you type)
   ===================================================================== */
const ROMAJI_MAP = {
  // basic vowels
  a:'あ',i:'い',u:'う',e:'え',o:'お',
  // k
  ka:'か',ki:'き',ku:'く',ke:'け',ko:'こ',
  // s
  sa:'さ',si:'し',shi:'し',su:'す',se:'せ',so:'そ',
  // t
  ta:'た',ti:'ち',chi:'ち',tu:'つ',tsu:'つ',te:'て',to:'と',
  // n
  na:'な',ni:'に',nu:'ぬ',ne:'ね',no:'の',
  // h
  ha:'は',hi:'ひ',hu:'ふ',fu:'ふ',he:'へ',ho:'ほ',
  // m
  ma:'ま',mi:'み',mu:'む',me:'め',mo:'も',
  // y
  ya:'や',yu:'ゆ',yo:'よ',
  // r
  ra:'ら',ri:'り',ru:'る',re:'れ',ro:'ろ',
  // w
  wa:'わ',wi:'ゐ',we:'ゑ',wo:'を',
  // n (standalone)
  nn:'ん',xn:'ん',
  // g
  ga:'が',gi:'ぎ',gu:'ぐ',ge:'げ',go:'ご',
  // z
  za:'ざ',zi:'じ',ji:'じ',zu:'ず',ze:'ぜ',zo:'ぞ',
  // d
  da:'だ',di:'ぢ',du:'づ',de:'で',do:'ど',
  // b
  ba:'ば',bi:'び',bu:'ぶ',be:'べ',bo:'ぼ',
  // p
  pa:'ぱ',pi:'ぴ',pu:'ぷ',pe:'ぺ',po:'ぽ',
  // compound sounds
  kya:'きゃ',kyu:'きゅ',kyo:'きょ',
  sha:'しゃ',shu:'しゅ',sho:'しょ',
  cha:'ちゃ',chu:'ちゅ',cho:'ちょ',
  nya:'にゃ',nyu:'にゅ',nyo:'にょ',
  hya:'ひゃ',hyu:'ひゅ',hyo:'ひょ',
  mya:'みゃ',myu:'みゅ',myo:'みょ',
  rya:'りゃ',ryu:'りゅ',ryo:'りょ',
  gya:'ぎゃ',gyu:'ぎゅ',gyo:'ぎょ',
  ja:'じゃ',ju:'じゅ',jo:'じょ',
  bya:'びゃ',byu:'びゅ',byo:'びょ',
  pya:'ぴゃ',pyu:'ぴゅ',pyo:'ぴょ',
  // small kana
  xa:'ぁ',xi:'ぃ',xu:'ぅ',xe:'ぇ',xo:'ぉ',
  xya:'ゃ',xyu:'ゅ',xyo:'ょ',xtu:'っ',xtsu:'っ',
  // punctuation
  '.':'。',',':'、','?':'？','!':'！','-':'ー',
};

// Katakana versions (offset +0x60 from hiragana)
const KATAKANA_MAP = {};
for (const [k, v] of Object.entries(ROMAJI_MAP)) {
  const kata = v.split('').map(c => {
    const code = c.charCodeAt(0);
    // hiragana range → katakana
    if (code >= 0x3041 && code <= 0x3096) return String.fromCharCode(code + 0x60);
    return c;
  }).join('');
  KATAKANA_MAP[k] = kata;
}

function romajiToKana(text, useKatakana) {
  const map = useKatakana ? KATAKANA_MAP : ROMAJI_MAP;
  let result = '';
  let buf = '';
  let i = 0;
  while (i < text.length) {
    const c = text[i].toLowerCase();
    // Handle double consonant → っ/ッ
    if (c === text[i+1]?.toLowerCase() && 'bcdfghjklmpqrstvwxyz'.includes(c) && c !== 'n') {
      result += useKatakana ? 'ッ' : 'っ';
      i++;
      continue;
    }
    buf += c;
    // Try longest match first (4, 3, 2, 1 chars)
    let matched = false;
    for (let len = Math.min(buf.length, 4); len >= 1; len--) {
      const tryStr = buf.slice(buf.length - len);
      if (map[tryStr]) {
        result += buf.slice(0, buf.length - len) + map[tryStr];
        buf = '';
        matched = true;
        break;
      }
    }
    // Handle standalone 'n' before non-vowel/non-y
    if (!matched && buf.length >= 2 && buf[0] === 'n' && !'aiueony'.includes(buf[1])) {
      result += useKatakana ? 'ン' : 'ん';
      buf = buf.slice(1);
    }
    i++;
  }
  // Trailing 'n' → ん
  if (buf === 'n') { result += useKatakana ? 'ン' : 'ん'; buf = ''; }
  result += buf; // leftover romaji stays as-is
  return result;
}

// Attach IME to all kana/particle/sentence inputs
function attachIME(input) {
  if (input.dataset.imeAttached) return;
  input.dataset.imeAttached = '1';
  const isKatakana = input.placeholder?.includes('カタカナ') || input.dataset.script === 'katakana';

  input.addEventListener('input', function() {
    const pos = this.selectionStart;
    const val = this.value;
    // Don't convert if already contains kana (user has system IME)
    if (/[\u3040-\u30FF]/.test(val.slice(-1))) return;
    const converted = romajiToKana(val, isKatakana);
    if (converted !== val) {
      this.value = converted;
      // Try to restore cursor position approximately
      const diff = converted.length - val.length;
      this.selectionStart = this.selectionEnd = Math.max(0, pos + diff);
    }
  });
}

// Observe DOM for dynamically created inputs and attach IME
const imeObserver = new MutationObserver(() => {
  document.querySelectorAll('.dict-kana, .particle-input, .sentence-input, [data-script]').forEach(attachIME);
});
imeObserver.observe(document.body || document.documentElement, { childList: true, subtree: true });
// Also attach on load
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.querySelectorAll('.dict-kana, .particle-input, .sentence-input, [data-script]').forEach(attachIME);
  }, 500);
});

/* =====================================================================

  {id:"d10", romaji:"sofa",            kana:"ソファ",                            english:["sofa","couch"],                                 script:"katakana",  ch:5},

  {id:"d14", romaji:"tatemono",        kana:"たてもの",                          english:["building","structure"],                         script:"hiragana",  ch:4},
  {id:"d15", romaji:"tsukue",          kana:"つくえ",                            english:["desk"],                                         script:"hiragana",  ch:5},
  {id:"d16", romaji:"mado",            kana:"まど",                              english:["window"],                                       script:"hiragana",  ch:5},
  {id:"d17", romaji:"hondana",         kana:"ほんだな",                          english:["bookshelf","bookcase"],                         script:"hiragana",  ch:5},
  {id:"d18", romaji:"tomodachi",       kana:"ともだち",                          english:["friend"],                                       script:"hiragana",  ch:6},

  {id:"d21", romaji:"tsukue no ue ni hon ga arimasu",  kana:"つくえの うえに ほんが あります",    english:["there is a book on the desk"],                              script:"hiragana", isSentence:true, ch:5},
  {id:"d22", romaji:"issho ni tenisu o shimasen ka",   kana:"いっしょに テニスを しませんか",      english:["won't you play tennis together","shall we play tennis together"], script:"mixed", isSentence:true, ch:6},
];

const POOL_B = [
  {id:"v1",  english:"post office",       correct:["ゆうびんきょく"],                    script:"hiragana", ch:4},
  {id:"v2",  english:"park",              correct:["こうえん"],                          script:"hiragana", ch:4},
  {id:"v3",  english:"hospital",          correct:["びょういん"],                        script:"hiragana", ch:4},

/* =====================================================================
   SEEDED RNG (mulberry32)
   ===================================================================== */
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function shuffleArr(arr, rng) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(arr, n, rng) {
  return shuffleArr(arr, rng).slice(0, n);
}

/* =====================================================================
   VARIANT GENERATOR
   ===================================================================== */
function generateVariant(seed) {
  const rng = mulberry32(seed);

  // Pool A: 6 items — ≥2 katakana, ≥2 hiragana, ≥1 sentence
  const aKata    = POOL_A.filter(x => !x.isSentence && x.script === "katakana");
  const aHira    = POOL_A.filter(x => !x.isSentence && x.script === "hiragana");
  const aSent    = POOL_A.filter(x => x.isSentence);
  const aMixed   = POOL_A.filter(x => x.isSentence && x.script === "mixed");

  let picked_a = [];
  picked_a.push(...pickN(aKata, 2, rng));
  picked_a.push(...pickN(aHira, 2, rng));
  picked_a.push(...pickN(aSent, 1, rng));
  // pick 1 more from remainder
  const usedIds_a = new Set(picked_a.map(x => x.id));
  const remaining_a = POOL_A.filter(x => !usedIds_a.has(x.id));
  picked_a.push(...pickN(remaining_a, 1, rng));
  picked_a = shuffleArr(picked_a, rng);

  // Pool B: 6 items — even chapter mix
  const b4 = POOL_B.filter(x => x.ch === 4);
  const b5 = POOL_B.filter(x => x.ch === 5);
  const b6 = POOL_B.filter(x => x.ch === 6);
  let picked_b = [];
  picked_b.push(...pickN(b4, 2, rng));
  picked_b.push(...pickN(b5, 2, rng));
  picked_b.push(...pickN(b6, 2, rng));
  picked_b = shuffleArr(picked_b, rng);

  // Pool C: 8 items — even chapter mix
  const c4 = POOL_C.filter(x => x.ch === 4);
  const c5 = POOL_C.filter(x => x.ch === 5);
  const c6 = POOL_C.filter(x => x.ch === 6);
  let picked_c = [];
  picked_c.push(...pickN(c4, 3, rng));
  picked_c.push(...pickN(c5, 3, rng));
  picked_c.push(...pickN(c6, 2, rng));
  picked_c = shuffleArr(picked_c, rng);

  // Pool D: 10 items — ~3 per chapter
  const d4 = POOL_D.filter(x => x.ch === 4);
  const d5 = POOL_D.filter(x => x.ch === 5);
  const d6 = POOL_D.filter(x => x.ch === 6);
  let picked_d = [];
  picked_d.push(...pickN(d4, 3, rng));
  picked_d.push(...pickN(d5, 3, rng));
  picked_d.push(...pickN(d6, 4, rng));
  picked_d = shuffleArr(picked_d, rng);

  return { a: picked_a, b: picked_b, c: picked_c, d: picked_d };
}

/* =====================================================================
   NORMALIZATION & GRADING
   ===================================================================== */
const FW_HW = {
  'Ａ':'A','Ｂ':'B','Ｃ':'C','Ｄ':'D','Ｅ':'E','Ｆ':'F','Ｇ':'G','Ｈ':'H',
  'Ｉ':'I','Ｊ':'J','Ｋ':'K','Ｌ':'L','Ｍ':'M','Ｎ':'N','Ｏ':'O','Ｐ':'P',
  'Ｑ':'Q','Ｒ':'R','Ｓ':'S','Ｔ':'T','Ｕ':'U','Ｖ':'V','Ｗ':'W','Ｘ':'X',
  'Ｙ':'Y','Ｚ':'Z','ａ':'a','ｂ':'b','ｃ':'c','ｄ':'d','ｅ':'e','ｆ':'f',
  'ｇ':'g','ｈ':'h','ｉ':'i','ｊ':'j','ｋ':'k','ｌ':'l','ｍ':'m','ｎ':'n',
  'ｏ':'o','ｐ':'p','ｑ':'q','ｒ':'r','ｓ':'s','ｔ':'t','ｕ':'u','ｖ':'v',
  'ｗ':'w','ｘ':'x','ｙ':'y','ｚ':'z','０':'0','１':'1','２':'2','３':'3',
  '４':'4','５':'5','６':'6','７':'7','８':'8','９':'9','　':' ',
};

function normalize(str) {
  if (!str) return '';
  // full-width to half-width
  str = str.split('').map(c => FW_HW[c] || c).join('');
  // trim and collapse spaces
  str = str.trim().replace(/\s+/g, ' ');
  // lowercase
  str = str.toLowerCase();
  // strip trailing punctuation
  str = str.replace(/[。、．，.!！?？]+$/g, '');
  return str;
}

function isCorrectAnswer(userInput, correctArr) {
  const u = normalize(userInput);
  if (!u) return false;
  return correctArr.some(c => normalize(c) === u);
}

/* =====================================================================
   TTS
   ===================================================================== */
function speakJP(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 0.85;
  speechSynthesis.speak(utt);
}

function buildParticleSentenceHTML(q, qIdx) {
  // Replace {1},{2},{3} with input fields
  let parts = q.sentence.split(/(\{[0-9]+\})/);
  let blankCount = 0;
  let html = '<span class="particle-sentence">';
  for (const part of parts) {
    const m = part.match(/^\{([0-9]+)\}$/);
    if (m) {
      const bi = parseInt(m[1]) - 1;
      blankCount++;
      html += `<span class="particle-blank-wrap">
        <input type="text" class="particle-input"
               data-q="${qIdx}" data-blank="${bi}"
               maxlength="4"
               placeholder="　"
               aria-label="particle blank ${blankCount}"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </span>`;
    } else {
      // Make Japanese spans clickable for TTS
      html += `<span class="tts-span" onclick="speakJP(this.textContent)" style="cursor:pointer">${part}</span>`;
    }
  }
  html += '</span>';
  return html;
}

    <div class="ime-hint">💡 Type romaji → auto-converts to kana (e.g. "tsukue" → つくえ, "arimasu" → あります)</div>
    <div class="section-pts">10 pts</div>
  </div>`;
  variant.d.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-item';
    div.dataset.pool = 'd';
    div.dataset.id = q.id;
    div.innerHTML = `
      <div class="q-number">D${i+1} <span class="ch-badge">Ch.${q.ch}</span> <span class="ch-badge">${q.grammar}</span></div>
      <div class="q-prompt" style="font-family: var(--font-en); font-size:15px; cursor:default">${q.english}</div>
      <textarea class="sent-ans" data-id="${q.id}"
        placeholder="日本語で書いてください…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        rows="2"></textarea>
      <div class="feedback-row" id="fb-d-${q.id}"></div>
    `;
    secD.appendChild(div);
  });
  body.appendChild(secD);
}

/* =====================================================================
   SUBMIT / GRADE
   ===================================================================== */
function submitExam() {
  if (!currentVariant) return;
  const v = currentVariant;

  let scoreA = 0, scoreB = 0, scoreC = 0, scoreD = 0;

  // --- Grade A ---
  v.a.forEach(q => {
    const kanaInput = document.querySelector(`.dict-kana[data-id="${q.id}"]`);
    const engInput  = document.querySelector(`.dict-eng[data-id="${q.id}"]`);
    const kanaVal   = kanaInput ? kanaInput.value : '';
    const engVal    = engInput  ? engInput.value  : '';

    const kanaOk = normalize(kanaVal) === normalize(q.kana);
    const engOk  = q.english.some(e => normalize(engVal) === normalize(e));

    const half = kanaOk ? 0.5 : 0;
    const half2 = engOk ? 0.5 : 0;
    scoreA += half + half2;

    const qItem = document.querySelector(`.q-item[data-id="${q.id}"]`);
    const fb    = document.getElementById(`fb-a-${q.id}`);

    const pts = half + half2;
    if (pts === 1) {
      qItem.classList.add('correct'); qItem.classList.remove('wrong','partial');
    } else if (pts === 0.5) {
      qItem.classList.add('partial'); qItem.classList.remove('correct','wrong');
    } else {
      qItem.classList.add('wrong'); qItem.classList.remove('correct','partial');
    }

    let fbHtml = '';
    // Kana feedback
    if (kanaOk) {
      fbHtml += `<div><span class="mark ok">✓</span><span class="feedback-correct">Kana: ${q.kana}</span></div>`;
    } else {
      fbHtml += `<div><span class="mark fail">✗</span> Kana: <span class="feedback-wrong"><span class="user-ans">${escHtml(kanaVal)||'(blank)'}</span> → <span class="correct-ans">${q.kana}</span></span></div>`;
    }
    // English feedback
    if (engOk) {
      fbHtml += `<div><span class="mark ok">✓</span><span class="feedback-correct">English: ${escHtml(engVal)}</span></div>`;
    } else {
      fbHtml += `<div><span class="mark fail">✗</span> English: <span class="feedback-wrong"><span class="user-ans">${escHtml(engVal)||'(blank)'}</span> → <span class="correct-ans">${q.english[0]}</span></span></div>`;
    }
    fb.innerHTML = fbHtml;
    fb.classList.add('visible');
  });

  // --- Grade B ---
  v.b.forEach(q => {
    const inp = document.querySelector(`.vocab-ans[data-id="${q.id}"]`);
    const val = inp ? inp.value : '';
    const ok  = isCorrectAnswer(val, q.correct);
    scoreB += ok ? 1 : 0;

    const qItem = document.querySelector(`.q-item[data-id="${q.id}"]`);
    const fb    = document.getElementById(`fb-b-${q.id}`);
    if (ok) {
      qItem.classList.add('correct'); qItem.classList.remove('wrong');
    } else {
      qItem.classList.add('wrong'); qItem.classList.remove('correct');
    }
    if (ok) {
      fb.innerHTML = `<span class="mark ok">✓</span><span class="feedback-correct">${q.correct[0]}</span>`;
    } else {
      fb.innerHTML = `<span class="mark fail">✗</span> <span class="feedback-wrong"><span class="user-ans">${escHtml(val)||'(blank)'}</span> → <span class="correct-ans">${q.correct[0]}</span></span>`;
    }
    fb.classList.add('visible');
  });

  // --- Grade C ---
  v.c.forEach(q => {
    // Find all particle inputs for this question
    const qItem = document.querySelector(`.q-item[data-id="${q.id}"]`);
    const inputs = qItem ? qItem.querySelectorAll('.particle-input') : [];
    let allOk = true;
    let feedbackParts = [];

    q.correct.forEach((correctParticle, bi) => {
      const inp = inputs[bi];
      const val = inp ? inp.value : '';
      const ok  = normalize(val) === normalize(correctParticle);
      if (!ok) allOk = false;
      if (ok) {
        feedbackParts.push(`<span class="mark ok">✓</span><span class="feedback-correct">Blank ${bi+1}: ${correctParticle}</span>`);
      } else {
        feedbackParts.push(`<span class="mark fail">✗</span> Blank ${bi+1}: <span class="feedback-wrong"><span class="user-ans">${escHtml(val)||'(blank)'}</span> → <span class="correct-ans">${correctParticle}</span></span>`);
      }
    });

    scoreC += allOk ? 1 : 0;
    const fb = document.getElementById(`fb-c-${q.id}`);
    if (allOk) {
      qItem.classList.add('correct'); qItem.classList.remove('wrong');
    } else {
      qItem.classList.add('wrong'); qItem.classList.remove('correct');
    }
    fb.innerHTML = feedbackParts.join('<br>');
    fb.classList.add('visible');
  });

  // --- Grade D ---
  v.d.forEach(q => {
    const ta  = document.querySelector(`.sent-ans[data-id="${q.id}"]`);
    const val = ta ? ta.value : '';
    const ok  = isCorrectAnswer(val, q.correct);
    scoreD += ok ? 1 : 0;

    const qItem = document.querySelector(`.q-item[data-id="${q.id}"]`);
    const fb    = document.getElementById(`fb-d-${q.id}`);
    if (ok) {
      qItem.classList.add('correct'); qItem.classList.remove('wrong');
    } else {
      qItem.classList.add('wrong'); qItem.classList.remove('correct');
    }
    if (ok) {
      fb.innerHTML = `<span class="mark ok">✓</span><span class="feedback-correct">${q.correct[0]}</span>`;
    } else {
      fb.innerHTML = `<span class="mark fail">✗</span> <span class="feedback-wrong"><span class="user-ans">${escHtml(val)||'(blank)'}</span></span><br><span class="mark ok" style="opacity:0">✓</span><span class="feedback-correct">${q.correct[0]}</span>`;
    }
    fb.classList.add('visible');
  });

  const total = scoreA + scoreB + scoreC + scoreD;
  const pct   = (total / 30) * 100;
  let grade;
  if (pct >= 90) grade = 'S';
  else if (pct >= 80) grade = 'A';
  else if (pct >= 70) grade = 'B';
  else if (pct >= 60) grade = 'C';
  else grade = '再挑戦';

  const banner = document.getElementById('score-banner');
  document.getElementById('grade-display').textContent = grade;
  document.getElementById('score-text').textContent = `${total} / 30 points (${Math.round(pct)}%)`;
  document.getElementById('score-breakdown').textContent =
    `A: ${scoreA}/6  |  B: ${scoreB}/6  |  C: ${scoreC}/8  |  D: ${scoreD}/10`;
  banner.classList.add('visible');
  banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* =====================================================================
   ANSWER KEY
   ===================================================================== */
let akVisible = false;
function toggleAnswerKey() {
  akVisible = !akVisible;
  const sec = document.getElementById('answer-key-section');
  sec.classList.toggle('visible', akVisible);
  const btn = document.querySelector('.btn[onclick="toggleAnswerKey()"]');
  btn.textContent = akVisible ? 'Hide Answer Key' : 'Show Answer Key';
  if (akVisible) {
    buildAnswerKey();
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function buildAnswerKey() {
  if (!currentVariant) return;
  const v = currentVariant;
  const body = document.getElementById('ak-body');
  body.innerHTML = '';

  const sections = [
    { label: 'Section A — Dictation', items: v.a, render: q => `${q.kana} / ${q.english[0]}` },
    { label: 'Section B — Vocabulary', items: v.b, render: q => q.correct[0] },
    { label: 'Section C — Particles', items: v.c, render: q => q.correct.join(', ') },
    { label: 'Section D — Sentences', items: v.d, render: q => q.correct[0] },
  ];
  const prefixes = ['A','B','C','D'];
  sections.forEach((sec, si) => {
    const h = document.createElement('div');
    h.style.cssText = 'font-weight:700; color: var(--gold); margin: 14px 0 8px; font-size:14px;';
    h.textContent = sec.label;
    body.appendChild(h);
    sec.items.forEach((q, i) => {
      const d = document.createElement('div');
      d.className = 'ak-item';
      d.innerHTML = `<span class="ak-num">${prefixes[si]}${i+1}.</span><span class="ak-ans">${sec.render(q)}</span>`;
      body.appendChild(d);
    });
  });
}

/* =====================================================================
   PRINT
   ===================================================================== */
function printBlank() {
  document.body.classList.add('print-blank');
  document.body.classList.remove('print-with-key');
  // Hide feedback
  document.querySelectorAll('.feedback-row').forEach(el => el.style.display = 'none');
  window.print();
  document.body.classList.remove('print-blank');
  document.querySelectorAll('.feedback-row').forEach(el => el.style.display = '');
}

function printWithKey() {
  if (!currentVariant) { alert('Submit the exam first to see answers.'); return; }
  document.body.classList.add('print-with-key');
  document.body.classList.remove('print-blank');
  window.print();
  document.body.classList.remove('print-with-key');
}

/* =====================================================================
   RESET
   ===================================================================== */
function resetExam() {
  if (!confirm('Reset all answers? Your progress will be lost.')) return;
  document.querySelectorAll('input[type="text"], textarea').forEach(el => el.value = '');
  document.querySelectorAll('.q-item').forEach(el => {
    el.classList.remove('correct','wrong','partial');
  });
  document.querySelectorAll('.feedback-row').forEach(el => {
    el.innerHTML = '';
    el.classList.remove('visible');
  });
  document.getElementById('score-banner').classList.remove('visible');
  document.getElementById('answer-key-section').classList.remove('visible');
  akVisible = false;
  document.querySelector('.btn[onclick="toggleAnswerKey()"]').textContent = 'Show Answer Key';
}

/* =====================================================================
   NEW VARIANT
   ===================================================================== */
function newVariant() {
  if (!confirm('Generate a new variant? Current answers will be cleared.')) return;
  const seed = Math.floor(Math.random() * 999999) + 1;
  loadVariant(seed);
}

function loadVariant(seed) {
  currentSeed    = seed;
  currentVariant = generateVariant(seed);
  document.getElementById('seed-display').textContent = seed;
  buildExam(currentVariant);
  document.getElementById('score-banner').classList.remove('visible');
  document.getElementById('answer-key-section').classList.remove('visible');
  akVisible = false;
  document.querySelector('.btn[onclick="toggleAnswerKey()"]').textContent = 'Show Answer Key';
}

/* =====================================================================
   UTILS
   ===================================================================== */
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =====================================================================
   INIT
   ===================================================================== */
(function init() {
  const seed = Math.floor(Math.random() * 999999) + 1;
  loadVariant(seed);
})();
</script>
